<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>🎭 Joke Generator</h1>
            <p id="joke-text" class="joke-text">Click the button to generate a joke!</p>
            <div class="button-group">
                <button id="generate-btn" class="btn btn-primary">Generate Joke</button>
                <button id="copy-btn" class="btn btn-secondary">Copy Joke</button>
            </div>
            <div id="loading" class="loading hidden">Loading...</div>
            <div id="error" class="error hidden"></div>
            <div class="joke-history">
                <h3>Recent Jokes</h3>
                <ul id="history-list"></ul>
                <button id="clear-history-btn" class="btn btn-small">Clear History</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
